<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GeminiMate Share Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b1020;
        color: #e2e8f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      #status {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 2;
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 12px;
      }

      #viewer {
        width: 100%;
        height: 100%;
        border: none;
        background: #ffffff;
      }
    </style>
  </head>
  <body>
    <div id="status">Loading shared content...</div>
    <iframe
      id="viewer"
      sandbox="allow-scripts allow-forms allow-modals allow-popups allow-downloads"
      referrerpolicy="no-referrer"
    ></iframe>
    <script src="./share-viewer.js"></script>
  </body>
  </html>
